<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F Project</title>
    <style>
        :root {
            --tg-bg: #f4f5f7;
            --tg-blue: #2481cc;
            --tg-blue-hover: #2074b7;
            --tg-text: #222222;
            --tg-gray: #707579;
            --tg-border: #e4e7eb;
            --my-msg: #eeffde;
            --out-msg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--tg-bg); color: var(--tg-text); height: 100vh; width: 100vw; overflow: hidden; }
        
        .screen { display: none !important; width: 100%; height: 100%; }
        .screen.active { display: flex !important; flex-direction: column; }
        
        .auth-screen { background: white; justify-content: center; align-items: center; padding: 20px; }
        .auth-container { width: 100%; max-width: 360px; text-align: center; }
        .logo { font-size: 32px; font-weight: 700; color: var(--tg-blue); margin-bottom: 10px; }
        .subtitle { color: var(--tg-gray); font-size: 14px; margin-bottom: 24px; }
        
        .input-group { margin-bottom: 14px; }
        input { width: 100%; padding: 14px 16px; border: 1px solid var(--tg-border); border-radius: 10px; font-size: 16px; outline: none; background: #f9fafb; }
        input:focus { border-color: var(--tg-blue); background: white; }
        
        button { width: 100%; padding: 14px; background-color: var(--tg-blue); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
        button:active { background-color: var(--tg-blue-hover); }
        .link-btn { background: none; color: var(--tg-blue); font-size: 14px; margin-top: 16px; width: auto; }
        .error-msg { color: #e53935; font-size: 13px; margin-top: 6px; display: none; text-align: center; font-weight: 500; }

        .header-bar { height: 56px; background: white; border-bottom: 1px solid var(--tg-border); display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; }
        .header-title { font-size: 18px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .logout-icon { color: var(--tg-gray); font-size: 16px; background: none; width: auto; padding: 0; font-weight: normal; }

        .search-box { padding: 8px 16px; background: white; flex-shrink: 0; }
        .search-box input { padding: 8px 16px; font-size: 14px; border-radius: 20px; }
        
        .chat-list { flex: 1; overflow-y: auto; background: white; }
        .chat-item { display: flex; align-items: center; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #f5f5f5; }
        .chat-item:active { background: #f2f6fa; }

        .avatar { width: 44px; height: 44px; border-radius: 50%; color: white; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; margin-right: 12px; text-transform: uppercase; flex-shrink: 0; }
        .chat-info { flex: 1; min-width: 0; }
        .chat-info h4 { font-size: 16px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-info p { font-size: 13px; color: var(--tg-gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #screen-chat-window { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f4f5f7; z-index: 10; }
        .back-btn { background: none; color: var(--tg-blue); width: auto; padding: 8px 4px; font-size: 20px; font-weight: bold; margin: 0; }
        
        .message-container { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg-bubble { max-width: 75%; padding: 8px 14px; border-radius: 16px; font-size: 15px; word-break: break-word; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.07); }
        .msg-bubble.incoming { background: var(--out-msg); align-self: flex-start; border-top-left-radius: 4px; }
        .msg-bubble.outgoing { background: var(--my-msg); align-self: flex-end; border-top-right-radius: 4px; }
        
        .msg-input-area { padding: 8px 12px; background: white; display: flex; gap: 8px; align-items: center; border-top: 1px solid var(--tg-border); padding-bottom: calc(8px + env(safe-area-inset-bottom)); }
        .msg-input-area input { border-radius: 20px; padding: 10px 16px; font-size: 15px; }
        .msg-input-area button { width: 40px; height: 40px; border-radius: 50%; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
    </style>
</head>
<body>

    <!-- ЭКРАН ВХОДА -->
    <div id="screen-login" class="screen auth-screen active">
        <div class="auth-container">
            <div class="logo">F Project</div>
            <div class="subtitle">Вход в мессенджер</div>
            <div class="input-group"><input type="email" id="login-email" placeholder="Электронная почта"></div>
            <div class="input-group">
                <input type="password" id="login-password" placeholder="Пароль">
                <div id="login-error" class="error-msg"></div>
            </div>
            <button onclick="handleLogin()">Войти</button>
            <button class="link-btn" onclick="switchScreen('screen-register')">Создать аккаунт</button>
        </div>
    </div>

    <!-- ЭКРАН РЕГИСТРАЦИИ -->
    <div id="screen-register" class="screen auth-screen">
        <div class="auth-container">
            <div class="logo">F Project</div>
            <div class="subtitle">Регистрация</div>
            <div class="input-group"><input type="email" id="reg-email" placeholder="Электронная почта"></div>
            <div class="input-group">
                <input type="password" id="reg-password" placeholder="Пароль">
                <div id="reg-error" class="error-msg"></div>
            </div>
            <button onclick="handleRegister()">Зарегистрироваться</button>
            <button class="link-btn" onclick="switchScreen('screen-login')">Уже есть аккаунт?</button>
        </div>
    </div>

    <!-- ЭКРАН НАСТРОЙКИ ПРОФИЛЯ -->
    <div id="screen-setup" class="screen auth-screen">
        <div class="auth-container">
            <div class="logo">Профиль</div>
            <div class="subtitle">Придумайте никнейм</div>
            <div class="input-group"><input type="text" id="setup-name" placeholder="Ваше имя"></div>
            <div class="input-group">
                <input type="text" id="setup-username" placeholder="Юзернейм (например: user123)">
                <div id="setup-error" class="error-msg"></div>
            </div>
            <button onclick="handleSetupProfile()">Сохранить</button>
        </div>
    </div>

    <!-- ГЛАВНЫЙ ЭКРАН -->
    <div id="screen-main" class="screen">
        <div class="header-bar">
            <div class="header-title">Чаты</div>
            <button class="logout-icon" onclick="handleLogout()">Выйти</button>
        </div>
        <div class="search-box">
            <input type="text" id="searchBar" placeholder="Поиск по @username..." oninput="searchUsers()">
        </div>
        <div id="chatList" class="chat-list"></div>
    </div>

    <!-- ОКНО ЧАТА -->
    <div id="screen-chat-window" class="screen">
        <div class="header-bar">
            <button class="back-btn" onclick="closeChat()">←</button>
            <div id="active-avatar" class="avatar" style="width:36px; height:36px; font-size:14px; margin-right:4px;"></div>
            <div class="header-title" id="active-chat-title">Чат</div>
        </div>
        <div id="messageContainer" class="message-container"></div>
        <div class="msg-input-area">
            <input type="text" id="messageInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">➔</button>
        </div>
    </div>

<script>
    const API_URL = 'https://170-168-89-188.sslip.io'; 
    let myUsername = "";
    let currentChatUser = null;
    let chatInterval = null;

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const target = document.getElementById(screenId);
        if(target) target.classList.add('active');
    }

    function showError(elementId, text) {
        const errEl = document.getElementById(elementId);
        if (errEl) { errEl.innerText = text; errEl.style.display = 'block'; }
    }

    function hideErrors() {
        document.querySelectorAll('.error-msg').forEach(e => e.style.display = 'none');
    }

    async function handleRegister() {
        hideErrors();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        if(!email || !password) { showError('reg-error', 'Заполните все поля'); return; }
        
        try {
            const res = await fetch(`${API_URL}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Ошибка регистрации');
            localStorage.setItem('f_token', data.token);
            switchScreen('screen-setup');
        } catch (err) { showError('reg-error', err.message); }
    }

    async function handleLogin() {
        hideErrors();
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        if(!email || !password) { showError('login-error', 'Заполните все поля'); return; }

        try {
            const res = await fetch(`${API_URL}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Неверные данные');
            localStorage.setItem('f_token', data.token);
            await checkAuth();
        } catch (err) { showError('login-error', err.message); }
    }

    async function handleSetupProfile() {
        hideErrors();
        const token = localStorage.getItem('f_token');
        const display_name = document.getElementById('setup-name').value.trim();
        const username = document.getElementById('setup-username').value.trim();
        if(!display_name || !username) { showError('setup-error', 'Заполните все поля'); return; }

        try {
            const res = await fetch(`${API_URL}/profile/setup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': token },
                body: JSON.stringify({ username, display_name })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Ошибка сохранения');
            await checkAuth();
        } catch (err) { showError('setup-error', err.message); }
    }

    async function checkAuth() {
        const token = localStorage.getItem('f_token');
        if (!token) { switchScreen('screen-login'); return; }
        try {
            const res = await fetch(`${API_URL}/profile/me`, {
                headers: { 'Authorization': token }
            });
            if (res.status === 401) { handleLogout(); return; }
            const data = await res.json();
            if (!data.has_profile) { 
                switchScreen('screen-setup'); 
            } else {
                myUsername = data.profile.username;
                switchScreen('screen-main');
                loadChats();
            }
        } catch (e) { switchScreen('screen-login'); }
    }

    async function searchUsers() {
        const query = document.getElementById('searchBar').value.trim();
        if (!query) { loadChats(); return; }
        const token = localStorage.getItem('f_token');
        try {
            const res = await fetch(`${API_URL}/users/search?q=${encodeURIComponent(query)}`, {
                headers: { 'Authorization': token }
            });
            const users = await res.json();
            const list = document.getElementById('chatList');
            list.innerHTML = '';
            users.forEach(u => {
                list.innerHTML += `
                    <div class="chat-item" onclick="openChat('${u.username}', '${u.display_name}', '${u.avatar_color}')">
                        <div class="avatar" style="background:${u.avatar_color}">${u.display_name.charAt(0)}</div>
                        <div class="chat-info">
                            <h4>${u.display_name}</h4>
                            <p>@${u.username}</p>
                        </div>
                    </div>`;
            });
        } catch(e) {}
    }

    async function loadChats() {
        const searchInput = document.getElementById('searchBar');
        if (searchInput && searchInput.value.trim()) return;
        const token = localStorage.getItem('f_token');
        try {
            const res = await fetch(`${API_URL}/chats`, { headers: { 'Authorization': token } });
            const chats = await res.json();
            const list = document.getElementById('chatList');
            list.innerHTML = '';
            if(chats.length === 0) {
                list.innerHTML = '<div style="padding: 24px; color: var(--tg-gray); text-align:center; font-size:14px;">Введите юзернейм в поиск, чтобы начать общение</div>';
                return;
            }
            chats.forEach(c => {
                list.innerHTML += `
                    <div class="chat-item" onclick="openChat('${c.username}', '${c.display_name}', '${c.avatar_color}')">
                        <div class="avatar" style="background:${c.avatar_color}">${c.display_name.charAt(0)}</div>
                        <div class="chat-info">
                            <h4>${c.display_name}</h4>
                            <p>Открыть переписку</p>
                        </div>
                    </div>`;
            });
        } catch(e) {}
    }

    function openChat(username, displayName, avatarColor) {
        currentChatUser = username;
        document.getElementById('active-chat-title').innerText = displayName;
        const activeAv = document.getElementById('active-avatar');
        activeAv.style.background = avatarColor;
        activeAv.innerText = displayName.charAt(0);
        
        document.getElementById('screen-chat-window').classList.add('active');
        
        loadMessages();
        clearInterval(chatInterval);
        chatInterval = setInterval(loadMessages, 2000);
    }

    function closeChat() {
        currentChatUser = null;
        clearInterval(chatInterval);
        document.getElementById('screen-chat-window').classList.remove('active');
        loadChats();
    }

    async function loadMessages() {
        if (!currentChatUser) return;
        const token = localStorage.getItem('f_token');
        try {
            const res = await fetch(`${API_URL}/messages/${currentChatUser}`, { headers: { 'Authorization': token } });
            const messages = await res.json();
            const container = document.getElementById('messageContainer');
            const isAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 120;
            
            container.innerHTML = '';
            messages.forEach(m => {
                const side = m.sender_username === myUsername ? 'outgoing' : 'incoming';
                container.innerHTML += `<div class="msg-bubble ${side}">${m.text}</div>`;
            });

            if (isAtBottom) container.scrollTop = container.scrollHeight;
        } catch(e) {}
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChatUser) return;
        
        const token = localStorage.getItem('f_token');
        input.value = '';
        
        try {
            await fetch(`${API_URL}/messages/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': token },
                body: JSON.stringify({ receiver_username: currentChatUser, text: text })
            });
            loadMessages();
        } catch(e) {}
    }

    function handleLogout() {
        localStorage.removeItem('f_token');
        clearInterval(chatInterval);
        currentChatUser = null;
        document.getElementById('screen-chat-window').classList.remove('active');
        switchScreen('screen-login');
    }

    checkAuth();
</script>
</body>
</html>
