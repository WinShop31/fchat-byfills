<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F Project Messenger</title>
    <style>
        :root {
            --tg-bg: #e7ebf0;
            --tg-white: #ffffff;
            --tg-blue: #2481cc;
            --tg-blue-hover: #2074b7;
            --tg-text: #222222;
            --tg-gray: #707579;
            --tg-light-gray: #f1f1f1;
            --tg-border: #e4e7eb;
            --my-msg: #eeffde;
            --out-msg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--tg-bg); color: var(--tg-text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .auth-container { background: var(--tg-white); width: 100%; max-width: 400px; padding: 40px 35px; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.04); text-align: center; }
        .logo { font-size: 32px; font-weight: 700; color: var(--tg-blue); margin-bottom: 24px; }
        .subtitle { color: var(--tg-gray); font-size: 14px; margin-bottom: 20px; }
        
        .screen { display: none; width: 100%; }
        .screen.active { display: block; }
        
        .input-group { margin-bottom: 16px; text-align: left; }
        input, textarea { width: 100%; padding: 14px 16px; border: 1px solid var(--tg-border); border-radius: 10px; font-size: 16px; outline: none; background: #f9fafb; }
        input:focus { border-color: var(--tg-blue); background: white; }
        
        button { width: 100%; padding: 14px; background-color: var(--tg-blue); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        button:hover { background-color: var(--tg-blue-hover); }
        .link-btn { background: none; color: var(--tg-blue); font-size: 14px; margin-top: 16px; width: auto; }
        .error-msg { color: #e53935; font-size: 13px; margin-top: 6px; display: none; }

        /* ИНТЕРФЕЙС МЕССЕНДЖЕРА В СТИЛЕ TG */
        .messenger-layout {
            display: flex;
            width: 100vw;
            height: 100vh;
            background: white;
        }

        /* Левая панель (Чаты и Поиск) */
        .sidebar {
            width: 320px;
            border-right: 1px solid var(--tg-border);
            display: flex;
            flex-direction: column;
            background: white;
        }
        .sidebar-header { padding: 10px; border-bottom: 1px solid var(--tg-border); }
        .search-input { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--tg-border); font-size: 14px; }
        
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #f9f9f9; transition: background 0.2s; }
        .chat-item:hover, .chat-item.active { background: #f2f6fa; }

        .avatar { width: 45px; height: 45px; border-radius: 50%; color: white; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; margin-right: 12px; text-transform: uppercase; }
        .chat-info h4 { font-size: 15px; font-weight: 600; }
        .chat-info p { font-size: 13px; color: var(--tg-gray); }

        /* Правая панель (Окно чата) */
        .chat-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f4f5f7; /* Цвет фона переписки TG */
        }
        .chat-window-header { display: flex; align-items: center; padding: 14px 20px; background: white; border-bottom: 1px solid var(--tg-border); }
        
        .message-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        
        /* Сообщения-облачка */
        .msg-bubble { max-width: 60%; padding: 10px 14px; border-radius: 12px; font-size: 15px; word-break: break-word; line-height: 1.4; position: relative;}
        .msg-bubble.incoming { background: var(--out-msg); align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg-bubble.outgoing { background: var(--my-msg); align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        
        .msg-input-area { padding: 15px; background: white; display: flex; gap: 10px; align-items: center; }
        .msg-input-area input { flex: 1; border-radius: 20px; padding: 12px 20px; }
        .msg-input-area button { width: auto; border-radius: 50%; width: 45px; height: 45px; margin-top: 0; padding: 0; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <!-- ЭКРАН ВХОДА -->
    <div id="screen-login" class="screen auth-container active">
        <div class="logo">F Project</div>
        <div class="subtitle">Войдите в мессенджер</div>
        <div class="input-group"><input type="email" id="login-email" placeholder="Электронная почта"></div>
        <div class="input-group">
            <input type="password" id="login-password" placeholder="Пароль">
            <div id="login-error" class="error-msg"></div>
        </div>
        <button onclick="handleLogin()">Войти</button>
        <button class="link-btn" onclick="switchScreen('screen-register')">Создать аккаунт</button>
    </div>

    <!-- ЭКРАН РЕГИСТРАЦИИ -->
    <div id="screen-register" class="screen auth-container">
        <div class="logo">F Project</div>
        <div class="subtitle">Регистрация нового аккаунта</div>
        <div class="input-group"><input type="email" id="reg-email" placeholder="Электронная почта"></div>
        <div class="input-group">
            <input type="password" id="reg-password" placeholder="Пароль">
            <div id="reg-error" class="error-msg"></div>
        </div>
        <button onclick="handleRegister()">Зарегистрироваться</button>
        <button class="link-btn" onclick="switchScreen('screen-login')">Уже есть аккаунт?</button>
    </div>

    <!-- ЭКРАН НАСТРОЙКИ ПРОФИЛЯ -->
    <div id="screen-setup" class="screen auth-container">
        <div class="logo">Профиль</div>
        <div class="subtitle">Укажите ваши данные</div>
        <div class="input-group"><input type="text" id="setup-name" placeholder="Ваше имя"></div>
        <div class="input-group">
            <input type="text" id="setup-username" placeholder="Юзернейм (например: tg_user)">
            <div id="setup-error" class="error-msg"></div>
        </div>
        <button onclick="handleSetupProfile()">Сохранить</button>
    </div>

    <!-- РАБОЧИЙ ЭКРАН МЕССЕНДЖЕРА -->
    <div id="screen-main" class="screen messenger-layout">
        <!-- Левая колонка -->
        <div class="sidebar">
            <div class="sidebar-header">
                <input type="text" id="searchBar" class="search-input" placeholder="Поиск по @username..." oninput="searchUsers()">
            </div>
            <div id="chatList" class="chat-list">
                <!-- Сюда подгружаются чаты или результаты поиска -->
            </div>
            <button style="background:var(--tg-gray); border-radius:0; margin:0;" onclick="handleLogout()">Выйти</button>
        </div>
        
        <!-- Правая колонка -->
        <div class="chat-window">
            <div class="chat-window-header">
                <div id="active-avatar" class="avatar" style="display:none; width:35px; height:35px; font-size:14px;"></div>
                <h4 id="active-chat-title">Выберите, кому хотите написать из списка слева</h4>
            </div>
            
            <div id="messageContainer" class="message-container">
                <!-- Тут будут сообщения -->
            </div>
            
            <div class="msg-input-area" id="inputArea" style="display: none;">
                <input type="text" id="messageInput" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">➔</button>
            </div>
        </div>
    </div>

<script>
    const API_URL = 'https://170-168-89-188.sslip.io'; 
    let myUsername = "";
    let currentChatUser = null;
    let chatInterval = null;

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        if (screenId !== 'screen-main') document.body.style.display = 'flex';
        else document.body.style.display = 'block';
    }

    function showError(elementId, text) {
        const errEl = document.getElementById(elementId);
        errEl.innerText = text; errEl.style.display = 'block';
    }

    async function handleRegister() {
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;
        try {
            const res = await fetch(`${API_URL}/auth/register`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail);
            localStorage.setItem('f_token', data.token);
            switchScreen('screen-setup');
        } catch (err) { showError('reg-error', err.message); }
    }

    async function handleLogin() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        try {
            const res = await fetch(`${API_URL}/auth/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail);
            localStorage.setItem('f_token', data.token);
            checkAuth();
        } catch (err) { showError('login-error', err.message); }
    }

    async function handleSetupProfile() {
        const token = localStorage.getItem('f_token');
        const display_name = document.getElementById('setup-name').value;
        const username = document.getElementById('setup-username').value;
        try {
            const res = await fetch(`${API_URL}/profile/setup`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': token }, body: JSON.stringify({ username, display_name }) });
            if (!res.ok) { const d = await res.json(); throw new Error(d.detail); }
            checkAuth();
        } catch (err) { showError('setup-error', err.message); }
    }

    async function checkAuth() {
        const token = localStorage.getItem('f_token');
        if (!token) { switchScreen('screen-login'); return; }
        try {
            const res = await fetch(`${API_URL}/profile/me`, { headers: { 'Authorization': token } });
            const data = await res.json();
            if (!res.ok || res.status === 401) { handleLogout(); return; }
            if (!data.has_profile) { switchScreen('screen-setup'); } 
            else {
                myUsername = data.profile.username;
                switchScreen('screen-main');
                loadChats();
            }
        } catch { switchScreen('screen-login'); }
    }

    // ПОИСК ПОЛЬЗОВАТЕЛЕЙ
    async function searchUsers() {
        const query = document.getElementById('searchBar').value;
        if (!query.strip) { loadChats(); return; }
        const token = localStorage.getItem('f_token');
        const res = await fetch(`${API_URL}/users/search?q=${query}`, { headers: { 'Authorization': token } });
        const users = await res.json();
        
        const list = document.getElementById('chatList');
        list.innerHTML = '';
        users.forEach(u => {
            list.innerHTML += `
                <div class="chat-item" onclick="openChat('${u.username}', '${u.display_name}', '${u.avatar_color}')">
                    <div class="avatar" style="background:${u.avatar_color}">${u.display_name.charAt(0)}</div>
                    <div class="chat-info">
                        <h4>${u.display_name}</h4>
                        <p>@${u.username}</p>
                    </div>
                </div>`;
        });
    }

    // ЗАГРУЗКА ДИАЛОГОВ
    async function loadChats() {
        if (document.getElementById('searchBar').value) return;
        const token = localStorage.getItem('f_token');
        const res = await fetch(`${API_URL}/chats`, { headers: { 'Authorization': token } });
        const chats = await res.json();
        
        const list = document.getElementById('chatList');
        list.innerHTML = '';
        chats.forEach(c => {
            list.innerHTML += `
                <div class="chat-item ${currentChatUser === c.username ? 'active' : ''}" onclick="openChat('${c.username}', '${c.display_name}', '${c.avatar_color}')">
                    <div class="avatar" style="background:${c.avatar_color}">${c.display_name.charAt(0)}</div>
                    <div class="chat-info">
                        <h4>${c.display_name}</h4>
                        <p>Нажмите для переписки</p>
                    </div>
                </div>`;
        });
    }

    // ОТКРЫТИЕ ЧАТА И ЗАПУСК ОБНОВЛЕНИЯ СООБЩЕНИЙ
    function openChat(username, displayName, avatarColor) {
        currentChatUser = username;
        document.getElementById('active-chat-title').innerText = `${displayName} (@${username})`;
        const activeAv = document.getElementById('active-avatar');
        activeAv.style.display = 'flex';
        activeAv.style.background = avatarColor;
        activeAv.innerText = displayName.charAt(0);
        
        document.getElementById('inputArea').style.display = 'flex';
        
        loadMessages();
        
        // Сбрасываем старый интервал обновлений и запускаем опрос каждые 2 секунды
        clearInterval(chatInterval);
        chatInterval = setInterval(loadMessages, 2000);
    }

    // ЗАГРУЗКА СООБЩЕНИЙ В ЧАТЕ
    async function loadMessages() {
        if (!currentChatUser) return;
        const token = localStorage.getItem('f_token');
        const res = await fetch(`${API_URL}/messages/${currentChatUser}`, { headers: { 'Authorization': token } });
        const messages = await res.json();
        
        const container = document.getElementById('messageContainer');
        const isAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 100;
        
        container.innerHTML = '';
        messages.forEach(m => {
            const side = m.sender_username === myUsername ? 'outgoing' : 'incoming';
            container.innerHTML += `<div class="msg-bubble ${side}">${m.text}</div>`;
        });

        // Скроллим вниз только если пользователь сам не листал наверх историю
        if (isAtBottom) container.scrollTop = container.scrollHeight;
    }

    // ОТПРАВКА СООБЩЕНИЯ
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChatUser) return;
        
        const token = localStorage.getItem('f_token');
        input.value = '';
        
        await fetch(`${API_URL}/messages/send`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': token },
            body: JSON.stringify({ receiver_username: currentChatUser, text: text })
        });
        
        loadMessages();
        loadChats();
    }

    function handleLogout() {
        localStorage.removeItem('f_token');
        clearInterval(chatInterval);
        switchScreen('screen-login');
    }

    checkAuth();
</script>
</body>
</html>
