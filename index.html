<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F Project</title>
    <style>
        :root {
            --tg-bg: #f4f5f9;
            --tg-white: #ffffff;
            --tg-blue: #2481cc;
            --tg-blue-hover: #2074b7;
            --tg-text: #222222;
            --tg-gray: #707579;
            --tg-light-gray: #f1f1f1;
            --tg-border: #e4e7eb;
            --error-color: #e53935;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--tg-bg);
            color: var(--tg-text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--tg-white);
            width: 100%;
            max-width: 400px;
            padding: 40px 35px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            text-align: center;
        }

        .logo-area {
            margin-bottom: 24px;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            color: var(--tg-blue);
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--tg-gray);
            font-size: 14px;
            margin-top: 6px;
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
            position: relative;
        }

        input, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--tg-border);
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
            background: #f9fafb;
            color: var(--tg-text);
        }

        input:focus, textarea:focus {
            border-color: var(--tg-blue);
            background: var(--tg-white);
            box-shadow: 0 0 0 3px rgba(36, 129, 204, 0.1);
        }

        textarea {
            resize: none;
            height: 90px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--tg-blue);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.15s ease;
            margin-top: 8px;
        }

        button:hover {
            background-color: var(--tg-blue-hover);
        }

        .link-btn {
            background: none;
            color: var(--tg-blue);
            font-size: 14px;
            font-weight: 500;
            margin-top: 16px;
            padding: 0;
            width: auto;
        }
        
        .link-btn:hover {
            background: none;
            text-decoration: underline;
        }

        .error-msg {
            color: var(--error-color);
            font-size: 13px;
            margin-top: 6px;
            padding-left: 4px;
            display: none;
        }

        /* Стиль профиля в стиле Telegram */
        .tg-profile {
            text-align: left;
            margin-top: 10px;
        }

        .tg-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .tg-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #50a7ea, #2e72cc);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .tg-user-meta h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--tg-text);
        }

        .tg-user-meta span {
            font-size: 14px;
            color: var(--tg-blue);
        }

        .tg-info-box {
            background: #f9fafb;
            border: 1px solid var(--tg-border);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 24px;
        }

        .tg-info-label {
            font-size: 12px;
            color: var(--tg-gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .tg-info-value {
            font-size: 15px;
            color: var(--tg-text);
            word-break: break-word;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <div class="logo">F Project</div>
    </div>
    
    <!-- ЭКРАН ВХОДА -->
    <div id="screen-login" class="screen active">
        <div class="subtitle">Войдите, чтобы получить доступ к своей учетной записи</div>
        <div class="input-group">
            <input type="email" id="login-email" placeholder="Электронная почта">
        </div>
        <div class="input-group">
            <input type="password" id="login-password" placeholder="Пароль">
            <div id="login-error" class="error-msg"></div>
        </div>
        <button onclick="handleLogin()">Войти</button>
        <div>
            <button class="link-btn" onclick="switchScreen('screen-register')">Создать аккаунт</button>
        </div>
    </div>

    <!-- ЭКРАН РЕГИСТРАЦИИ -->
    <div id="screen-register" class="screen">
        <div class="subtitle">Зарегистрируйтесь в F Project прямо сейчас</div>
        <div class="input-group">
            <input type="email" id="reg-email" placeholder="Электронная почта">
        </div>
        <div class="input-group">
            <input type="password" id="reg-password" placeholder="Пароль">
            <div id="reg-error" class="error-msg"></div>
        </div>
        <button onclick="handleRegister()">Зарегистрироваться</button>
        <div>
            <button class="link-btn" onclick="switchScreen('screen-login')">Уже есть аккаунт?</button>
        </div>
    </div>

    <!-- ЭКРАН НАСТРОЙКИ ПРОФИЛЯ -->
    <div id="screen-setup" class="screen">
        <div class="subtitle">Давайте завершим создание профиля</div>
        <div class="input-group">
            <input type="text" id="setup-name" placeholder="Ваше имя">
        </div>
        <div class="input-group">
            <input type="text" id="setup-username" placeholder="Имя пользователя (username)">
        </div>
        <div class="input-group">
            <textarea id="setup-bio" placeholder="О себе (описание профиля)"></textarea>
            <div id="setup-error" class="error-msg"></div>
        </div>
        <button onclick="handleSetupProfile()">Сохранить данные</button>
    </div>

    <!-- ЭКРАН ПРОФИЛЯ (ГЛАВНАЯ) -->
    <div id="screen-main" class="screen">
        <div class="subtitle">Ваш персональный профиль сети</div>
        
        <div class="tg-profile">
            <div class="tg-header">
                <div id="user-avatar" class="tg-avatar">U</div>
                <div class="tg-user-meta">
                    <h3 id="user-display-name">Имя</h3>
                    <span id="user-tag">@username</span>
                </div>
            </div>
            
            <div class="tg-info-box">
                <div class="tg-info-label">О себе</div>
                <div id="user-bio" class="tg-info-value">Описание профиля...</div>
            </div>
        </div>

        <button style="background-color: var(--tg-gray);" onclick="handleLogout()">Выйти</button>
    </div>
</div>

<script>
    // ЖЕСТКО ВШИТЫЙ IP ВДС ДЛЯ СВЯЗИ С БЭКЕНДОМ
    const API_URL = 'http://170.168.89.188:8000'; 

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        document.querySelectorAll('.error-msg').forEach(e => { e.innerText = ''; e.style.display = 'none'; });
    }

    function showError(elementId, text) {
        const errEl = document.getElementById(elementId);
        errEl.innerText = text;
        errEl.style.display = 'block';
    }

    // РЕГИСТРАЦИЯ
    async function handleRegister() {
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;
        
        try {
            const res = await fetch(`${API_URL}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            
            if (!res.ok) throw new Error(data.detail || 'Ошибка регистрации');
            
            localStorage.setItem('f_token', data.token);
            switchScreen('screen-setup');
        } catch (err) {
            showError('reg-error', err.message);
        }
    }

    // ВХОД
    async function handleLogin() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        
        try {
            const res = await fetch(`${API_URL}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            
            if (!res.ok) throw new Error(data.detail || 'Ошибка входа');
            
            localStorage.setItem('f_token', data.token);
            
            if (data.has_profile) {
                checkAuthAndLoadMain();
            } else {
                switchScreen('screen-setup');
            }
        } catch (err) {
            showError('login-error', err.message);
        }
    }

    // НАСТРОЙКА ПРОФИЛЯ
    async function handleSetupProfile() {
        const token = localStorage.getItem('f_token');
        const display_name = document.getElementById('setup-name').value;
        const username = document.getElementById('setup-username').value;
        const bio = document.getElementById('setup-bio').value;

        try {
            const res = await fetch(`${API_URL}/profile/setup`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': token
                },
                body: JSON.stringify({ username, display_name, bio })
            });
            const data = await res.json();
            
            if (!res.ok) throw new Error(data.detail || 'Имя пользователя уже занято или некорректно');
            
            checkAuthAndLoadMain();
        } catch (err) {
            showError('setup-error', err.message);
        }
    }

    // ПРОВЕРКА АВТОРИЗАЦИИ И ЗАГРУЗКА ДАННЫХ
    async function checkAuthAndLoadMain() {
        const token = localStorage.getItem('f_token');
        if (!token) {
            switchScreen('screen-login');
            return;
        }

        try {
            const res = await fetch(`${API_URL}/profile/me`, {
                headers: { 'Authorization': token }
            });
            const data = await res.json();
            
            if (!res.ok || res.status === 401) {
                handleLogout();
                return;
            }

            if (!data.has_profile) {
                switchScreen('screen-setup');
            } else {
                const p = data.profile;
                
                // Наполняем данными в стиле Telegram
                document.getElementById('user-display-name').innerText = p.display_name;
                document.getElementById('user-tag').innerText = `@${p.username}`;
                document.getElementById('user-bio').innerText = p.bio || 'Не заполнено';
                
                // Первая буква имени для аватара
                document.getElementById('user-avatar').innerText = p.display_name.charAt(0);
                
                switchScreen('screen-main');
            }
        } catch (err) {
            switchScreen('screen-login');
        }
    }

    function handleLogout() {
        localStorage.removeItem('f_token');
        switchScreen('screen-login');
    }

    // Точка входа: проверяем сессию сразу при открытии вкладки
    checkAuthAndLoadMain();
</script>
</body>
  </html>
